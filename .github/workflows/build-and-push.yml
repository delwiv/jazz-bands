name: Build and Push Jazz Bands

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v'))

    permissions:
      contents: read
      packages: write
      id-token: write # For OIDC authentication with GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          version: latest

      - name: Log in to Container Registry (using OIDC)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # GitHub token for OIDC authentication (no password needed)
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/jazz-bands
          flavor: |
            latest=auto
            latest=true
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/heads/main') }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/jazz-bands
          file: apps/jazz-bands/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Pi4 = ARM64, else = AMD64 (builds as multi-arch manifest with QEMU)
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: echo ${{ steps.build-and-push.outputs.digest }}

      - name: Deploy stage
        if: startsWith(github.ref, 'refs/heads/main')
        run: |
          echo "Workflow completed successfully."
          echo "If you want GitHub Actions to auto-deploy to your Pi4 or VPS, add another step with SSH deployment."
          echo "Current image: ghcr.io/${{ github.repository_owner }}/jazz-bands:latest"
