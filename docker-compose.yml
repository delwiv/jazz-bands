# ============================================================================
# Jazz Bands Platform - Production (Legacy + Manager + Databases)
# ============================================================================
# This file manages:
# - Legacy Angular apps (6 bands)
# - Manager services (managr, managr-api)
# - Shared databases (Mongo, Redis)
# ============================================================================
#
# Dev mode: Use docker-compose.jazzbands-dev.yml
# Production SSR: Create new file when dev is complete
#
# Anchors for Legacy Apps
x-legacy-common: &legacy-common
  env_file: .env
  restart: always
  networks:
    - api-network
  depends_on:
    - mongo

volumes:
  traefik-certs-legacy:

networks:
  api-network:
    driver: bridge
    name: jazz-bands-api
  jazzbands-net:
    driver: bridge
    external: true

services:
  # ======================================================================
  # LEGACY ANGULAR APPS
  # ======================================================================

  boheme:
    container_name: boheme-legacy
    <<: *legacy-common
    build: ./apps/boheme
    environment:
      PORT: 3017
    ports:
      - "3017:3017"

  canto:
    container_name: canto-legacy
    <<: *legacy-common
    build: ./apps/canto
    environment:
      PORT: 3045
    ports:
      - "3045:3345"

  jazzola:
    container_name: jazzola-legacy
    <<: *legacy-common
    build: ./apps/jazzola
    environment:
      PORT: 3342
    ports:
      - "3342:3342"

  swing-family:
    container_name: swing-family-legacy
    <<: *legacy-common
    build: ./apps/swing-family
    environment:
      PORT: 3047
    ports:
      - "3047:3047"

  trio-rsh:
    container_name: trio-rsh-legacy
    <<: *legacy-common
    build: ./apps/trio-rsh
    environment:
      PORT: 3027
    ports:
      - "3027:3027"

  west-side-trio:
    container_name: west-side-trio-legacy
    <<: *legacy-common
    build: ./apps/west-side-trio
    environment:
      PORT: 7027
    ports:
      - "7027:7027"

  # ======================================================================
  # MANAGER SERVICES
  # ======================================================================

  managr:
    container_name: managr
    <<: *legacy-common
    build: ./apps/managr
    environment:
      PORT: 3091
      API_URL: ${MANAGR_API_URL}
    ports:
      - "3091:3091"

  managr-api:
    container_name: managr-api
    <<: *legacy-common
    build: ./apps/managr-api
    environment:
      PORT: 3092
    ports:
      - "3092:3092"
    depends_on:
      - mongo
      - redis

  # ======================================================================
  # DATABASES
  # ======================================================================

  mongo:
    image: "mongo:4.4.18"
    container_name: mongo
    env_file: .env
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo:/data/db
      - ./data/init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh
    networks:
      - api-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    image: "bitnami/redis:latest"
    container_name: redis
    restart: always
    user: "1001"
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    networks:
      - api-network
    command: /opt/bitnami/scripts/redis/run.sh --appendonly no
    volumes:
      - ./data/redis:/bitnami/redis/data
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M


