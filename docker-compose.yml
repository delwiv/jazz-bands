networks:
   api-network:
     driver: bridge
     external: false

services:
  boheme:
    env_file: .env
    container_name: boheme
    restart: always
    build: ./apps/boheme
    environment:
      PORT: 3017
    ports:
      - "3017:3017"
    networks:
      - api-network
    depends_on:
      - mongo

  canto:
    env_file: .env
    container_name: canto
    restart: always
    build: ./apps/canto
    environment:
      PORT: 3045
    ports:
      - "3045:3045"
    networks:
      - api-network
    depends_on:
      - mongo

  jazzola:
    env_file: .env
    container_name: jazzola
    restart: always
    build: ./apps/jazzola
    environment:
      PORT: 3342
    ports:
      - "3342:3342"
    networks:
      - api-network
    depends_on:
      - mongo

  swing-family:
    env_file: .env
    container_name: swing-family
    restart: always
    build: ./apps/swing-family
    environment:
      PORT: 3047
    ports:
      - "3047:3047"
    networks:
      - api-network
    depends_on:
      - mongo

  trio-rsh:
    env_file: .env
    container_name: trio-rsh
    restart: always
    build: ./apps/trio-rsh
    environment:
      PORT: 3027
    ports:
      - "3027:3027"
    networks:
      - api-network
    depends_on:
      - mongo

  west-side-trio:
    env_file: .env
    container_name: west-side-trio
    restart: always
    build: ./apps/west-side-trio
    environment:
      PORT: 7027
    ports:
      - "7027:7027"
    networks:
      - api-network
    depends_on:
      - mongo

  managr:
    env_file: .env
    container_name: managr
    restart: always
    build: ./apps/managr
    environment:
      PORT: 3091
      API_URL: $MANAGR_API_URL
    ports:
      - "3091:3091"
    networks:
      - api-network
    depends_on:
      - mongo

  managr-api:
    env_file: .env
    container_name: managr-api
    restart: always
    build: ./apps/managr-api
    environment:
      PORT: 3092
    ports:
      - "3092:3092"
    networks:
      - api-network
    depends_on:
      - mongo
      - redis

  mongo:
    image: "mongo:4.4.18"
    container_name: mongo
    env_file: .env
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=$MONGODB_ROOT_PASSWORD
    ports:
      - 27017:27017
    volumes:
      - ./data/mongo:/data/db
      - ./data/init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh
    networks:
      - api-network

  redis:
    image: "bitnami/redis:latest"
    container_name: redis
    restart: always
    user: "1001"
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    networks:
      - api-network
    command: /opt/bitnami/scripts/redis/run.sh --appendonly no
    volumes:
      - ./data/redis:/bitnami/redis/data

  # Shared PostgreSQL for Umami analytics (ARM64-compatible)
  postgres:
    image: "postgres:16-alpine"
    container_name: postgres-shared
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      shared_preload_libraries: ""
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c max_connections=50
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - api-network
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-umami} -d ${POSTGRES_DB:-umami}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

 # Umami Analytics (PostgreSQL + SQLite migration path)
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami-analytics
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://umami:${POSTGRES_PASSWORD}@postgres:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
      APP_NAME: Umami
      APP_PORT: 3000
      UMAMI_ANALYTICS_DOMAINS: ${UMAMI_ANALYTICS_DOMAINS}
    ports:
      - "3000:3000"
    networks:
      - api-network
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
