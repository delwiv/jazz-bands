# ============================================================================
# Jazz Bands Platform - Legacy + Manager + Shared Infrastructure
# ============================================================================
# This file manages:
# - Legacy Angular apps
# - Manager services
# - Shared databases (Mongo, Redis, PostgreSQL)
# - Analytics (Umami)
# ============================================================================
#
# To start jazzbands SSR apps, use:
#   docker-compose -f docker-compose.jazzbands.yml up -d
#
# To start jazzbands SSR apps in dev mode, use:
#   docker-compose -f docker-compose.jazzbands-dev.yml up -d
#
# Anchors for Legacy Apps
x-legacy-common: &legacy-common
  env_file: .env
  restart: always
  networks:
    - api-network
  depends_on:
    - mongo

volumes:
  traefik-certs-legacy:

networks:
  api-network:
    driver: bridge
    name: jazz-bands-api
  jazzbands-net:
    driver: bridge
    external: true

services:
  # ======================================================================
  # LEGACY ANGULAR APPS
  # ======================================================================

  boheme:
    container_name: boheme-legacy
    <<: *legacy-common
    build: ./apps/boheme
    environment:
      PORT: 3017
    ports:
      - "3017:3017"

  canto:
    container_name: canto-legacy
    <<: *legacy-common
    build: ./apps/canto
    environment:
      PORT: 3045
    ports:
      - "3045:3345"

  jazzola:
    container_name: jazzola-legacy
    <<: *legacy-common
    build: ./apps/jazzola
    environment:
      PORT: 3342
    ports:
      - "3342:3342"

  swing-family:
    container_name: swing-family-legacy
    <<: *legacy-common
    build: ./apps/swing-family
    environment:
      PORT: 3047
    ports:
      - "3047:3047"

  trio-rsh:
    container_name: trio-rsh-legacy
    <<: *legacy-common
    build: ./apps/trio-rsh
    environment:
      PORT: 3027
    ports:
      - "3027:3027"

  west-side-trio:
    container_name: west-side-trio-legacy
    <<: *legacy-common
    build: ./apps/west-side-trio
    environment:
      PORT: 7027
    ports:
      - "7027:7027"

  # ======================================================================
  # MANAGER SERVICES
  # ======================================================================

  managr:
    container_name: managr
    <<: *legacy-common
    build: ./apps/managr
    environment:
      PORT: 3091
      API_URL: ${MANAGR_API_URL}
    ports:
      - "3091:3091"

  managr-api:
    container_name: managr-api
    <<: *legacy-common
    build: ./apps/managr-api
    environment:
      PORT: 3092
    ports:
      - "3092:3092"
    depends_on:
      - mongo
      - redis

  # ======================================================================
  # DATABASES
  # ======================================================================

  mongo:
    image: "mongo:4.4.18"
    container_name: mongo
    env_file: .env
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo:/data/db
      - ./data/init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh
    networks:
      - api-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    image: "bitnami/redis:latest"
    container_name: redis
    restart: always
    user: "1001"
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    networks:
      - api-network
    command: /opt/bitnami/scripts/redis/run.sh --appendonly no
    volumes:
      - ./data/redis:/bitnami/redis/data
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  postgres:
    container_name: postgres-shared
    image: "postgres:16-alpine"
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      shared_preload_libraries: ""
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c max_connections=50
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - api-network
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ======================================================================
  # ANALYTICS (serves as "analytics.jazz.wildredbeard.tech" via labels)
  # ======================================================================

  umami:
    container_name: umami-analytics
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      APP_SECRET: ${UMAMI_APP_SECRET}
      APP_NAME: Umami
      APP_PORT: 3000
      UMAMI_ANALYTICS_DOMAINS: ${UMAMI_ANALYTICS_DOMAINS}
    ports:
      - "3000:3000"
    networks:
      - api-network
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
