# Anchors for band services
x-band-common: &band-common
  build:
    context: ./apps/jazz-bands
    dockerfile: Dockerfile.dev
  networks:
    - jazzbands-net
  env_file:
    - .env
  volumes:
    - ./apps/jazz-bands/app:/app/app
    - ./apps/jazz-bands/public:/app/public
    - ./apps/jazz-bands/vite.config.ts:/app/vite.config.ts
    - ./apps/jazz-bands/react-router.config.ts:/app/react-router.config.ts
    - ./apps/jazz-bands/tsconfig.json:/app/tsconfig.json
    - ./apps/jazz-bands/package.json:/app/package.json
    - ./apps/jazz-bands/package-lock.json:/app/package-lock.json
    - ./apps/jazz-bands/node_modules:/app/node_modules
    - ./apps/jazz-bands/.env:/app/.env

volumes:
  {}

networks:
  jazzbands-net:
    driver: bridge

services:
  traefik:
    image: traefik:latest
    container_name: jazzbands-traefik-dev
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:8012"
      - "--accesslog=true"
    ports:
      - "8012:8012"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - jazzbands-net

  boheme:
    <<: *band-common
    container_name: boheme-dev
    environment:
      BAND_SLUG: boheme
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID_BOHEME}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=jazzbands-net"
      - "traefik.http.routers.boheme-dev.entrypoints=web"
      - "traefik.http.routers.boheme-dev.rule=Host(`boheme.jazz.wildredbeard.tech`)"
      - "traefik.http.services.boheme-dev.loadbalancer.server.port=5173"

  canto:
    <<: *band-common
    container_name: canto-dev
    environment:
      BAND_SLUG: canto
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID_CANTO}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=jazzbands-net"
      - "traefik.http.routers.canto-dev.entrypoints=web"
      - "traefik.http.routers.canto-dev.rule=Host(`canto.jazz.wildredbeard.tech`)"
      - "traefik.http.services.canto-dev.loadbalancer.server.port=5173"

  jazzola:
