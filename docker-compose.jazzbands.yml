# Anchors for band services
x-band-common: &band-common
  build:
    context: ./apps/jazz-bands
    dockerfile: Dockerfile
  restart: always
  env_file: .env
  networks:
    - jazzbands-net
  deploy:
    resources:
      limits:
        memory: 256M
      reservations:
        memory: 128M
  labels:
    - "traefik.enable=true"
    - "traefik.docker.network=jazzbands-net"

volumes:
  traefik-certs:
  postgres-data:

networks:
  jazzbands-net:
    driver: bridge
  api-network:
    external: true

services:
  traefik:
    image: traefik:v3.0
    container_name: jazzbands-traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=delwiv@protonmail.com"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/acme
    restart: always
    networks:
      - jazzbands-net
    deploy:
      resources:
        limits:
          memory: 128M

 # ======================================================================
  # REACT SSR BAND APPS (6 bands)
  # ======================================================================

  boheme:
    <<: *band-common
    container_name: boheme-ssr
    build:
      args:
        BAND_SLUG: boheme
    environment:
      - PORT=3001
      - BAND_SLUG=boheme
      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID_BOHEME}
    labels:
      - "traefik.http.routers.boheme-ssr.entrypoints=websecure"
      - "traefik.http.routers.boheme-ssr.rule=Host(`boheme.jazz.wildredbeard.tech`)"
      - "traefik.http.routers.boheme-ssr.tls.certresolver=letsencrypt"
      - "traefik.http.services.boheme-ssr.loadbalancer.server.port=3001"

  canto:
    <<: *band-common
    container_name: canto-ssr
    build:
      args:
        BAND_SLUG: canto
    environment:
      - PORT=3002
      - BAND_SLUG=canto
      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID_CANTO}
    labels:
      - "traefik.http.routers.canto-ssr.entrypoints=websecure"
      - "traefik.http.routers.canto-ssr.rule=Host(`canto.jazz.wildredbeard.tech`)"
      - "traefik.http.routers.canto-ssr.tls.certresolver=letsencrypt"
      - "traefik.http.services.canto-ssr.loadbalancer.server.port=3002"

  jazzola:
    <<: *band-common
    container_name: jazzola-ssr
    build:
      args:
        BAND_SLUG: jazzola
    environment:
      - PORT=3003
      - BAND_SLUG=jazzola
      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID_JAZZOLA}
    labels:
      - "traefik.http.routers.jazzola-ssr.entrypoints=websecure"
      - "traefik.http.routers.jazzola-ssr.rule=Host(`jazzola.jazz.wildredbeard.tech`)"
      - "traefik.http.routers.jazzola-ssr.tls.certresolver=letsencrypt"
      - "traefik.http.services.jazzola-ssr.loadbalancer.server.port=3003"

  swing-family:
    <<: *band-common
    container_name: swing-family-ssr
    build:
      args:
        BAND_SLUG: swing-family
    environment:
      - PORT=3004
      - BAND_SLUG=swing-family
      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID_SWING_FAMILY}
    labels:
      - "traefik.http.routers.swing-family-ssr.entrypoints=websecure"
      - "traefik.http.routers.swing-family-ssr.rule=Host(`swing-family.jazz.wildredbeard.tech`)"
      - "traefik.http.routers.swing-family-ssr.tls.certresolver=letsencrypt"
      - "traefik.http.services.swing-family-ssr.loadbalancer.server.port=3004"

  trio-rsh:
    <<: *band-common
    container_name: trio-rsh-ssr
    build:
      args:
        BAND_SLUG: trio-rsh
    environment:
      - PORT=3005
      - BAND_SLUG=trio-rsh
      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID_TRIO_RSH}
    labels:
      - "traefik.http.routers.trio-rsh-ssr.entrypoints=websecure"
      - "traefik.http.routers.trio-rsh-ssr.rule=Host(`trio-rsh.jazz.wildredbeard.tech`)"
      - "traefik.http.routers.trio-rsh-ssr.tls.certresolver=letsencrypt"
      - "traefik.http.services.trio-rsh-ssr.loadbalancer.server.port=3005"

  west-side-trio:
    <<: *band-common
    container_name: west-side-trio-ssr
    build:
      args:
        BAND_SLUG: west-side-trio
    environment:
      - PORT=3006
      - BAND_SLUG=west-side-trio
      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID_WEST_SIDE_TRIO}
    labels:
      - "traefik.http.routers.west-side-trio-ssr.entrypoints=websecure"
      - "traefik.http.routers.west-side-trio-ssr.rule=Host(`west-side-trio.jazz.wildredbeard.tech`)"
      - "traefik.http.routers.west-side-trio-ssr.tls.certresolver=letsencrypt"
      - "traefik.http.services.west-side-trio-ssr.loadbalancer.server.port=3006"

 postgres:
    container_name: postgres-jazzbands
    image: postgres:16-alpine
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      shared_preload_libraries: ""
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c max_connections=50
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - api-network
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  umami:
    container_name: umami-jazzbands
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      APP_SECRET: ${UMAMI_APP_SECRET}
      APP_NAME: Umami
      APP_PORT: 3000
      UMAMI_ANALYTICS_DOMAINS: ${UMAMI_ANALYTICS_DOMAINS}
    ports:
      - "3000:3000"
    networks:
      - api-network
      - jazzbands-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=jazzbands-net"
      - "traefik.http.routers.umami-jazzbands.entrypoints=websecure"
      - "traefik.http.routers.umami-jazzbands.rule=Host(`analytics.jazz.wildredbeard.tech`)"
      - "traefik.http.routers.umami-jazzbands.tls.certresolver=letsencrypt"
      - "traefik.http.services.umami-jazzbands.loadbalancer.server.port=3000"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
