include:
  - docker-compose.base.yml

services:
  traefik:
    image: traefik:v3.0
    container_name: jazzbands-traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@jazzbands.com"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/acme
    restart: always
    networks:
      - jazzbands-net
    deploy:
      resources:
        limits:
          memory: 128M

  boheme:
    extends:
      service: common
      file: docker-compose.base.yml
    build:
      args:
        BAND_SLUG: boheme
    container_name: boheme-ssr
    environment:
      - PORT=3001
      - BAND_SLUG=boheme
    labels:
      - "traefik.http.routers.boheme.rule=Host(`boheme.jazzbands.com`)"

  canto:
    extends:
      service: common
      file: docker-compose.base.yml
    build:
      args:
        BAND_SLUG: canto
    container_name: canto-ssr
    environment:
      - PORT=3002
      - BAND_SLUG=canto
    labels:
      - "traefik.http.routers.canto.rule=Host(`canto.jazzbands.com`)"

  jazzola:
    extends:
      service: common
      file: docker-compose.base.yml
    build:
      args:
        BAND_SLUG: jazzola
    container_name: jazzola-ssr
    environment:
      - PORT=3003
      - BAND_SLUG=jazzola
    labels:
      - "traefik.http.routers.jazzola.rule=Host(`jazzola.jazzbands.com`)"

  swing-family:
    extends:
      service: common
      file: docker-compose.base.yml
    build:
      args:
        BAND_SLUG: swing-family
    container_name: swing-family-ssr
    environment:
      - PORT=3004
      - BAND_SLUG=swing-family
    labels:
      - "traefik.http.routers.swing-family.rule=Host(`swing-family.jazzbands.com`)"

  trio-rsh:
    extends:
      service: common
      file: docker-compose.base.yml
    build:
      args:
        BAND_SLUG: trio-rsh
    container_name: trio-rsh-ssr
    environment:
      - PORT=3005
      - BAND_SLUG=trio-rsh
    labels:
      - "traefik.http.routers.trio-rsh.rule=Host(`trio-rsh.jazzbands.com`)"

  west-side-trio:
    extends:
      service: common
      file: docker-compose.base.yml
    build:
      args:
        BAND_SLUG: west-side-trio
    container_name: west-side-trio-ssr
    environment:
      - PORT=3006
      - BAND_SLUG=west-side-trio
    labels:
      - "traefik.http.routers.west-side-trio.rule=Host(`west-side-trio.jazzbands.com`)"

volumes:
  traefik-certs:
