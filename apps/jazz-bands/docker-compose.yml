# Anchors for repeated config
x-band-common: &band-common
  build:
    context: .
    dockerfile: Dockerfile
  networks:
    - jazzbands-net
  restart: always
  environment:
    - SANITY_STUDIO_PROJECT_ID
    - SANITY_STUDIO_DATASET
    - SANITY_STUDIO_API_READ_TOKEN
    - SANITY_STUDIO_API_WRITE_TOKEN
    - NODE_ENV=production
  deploy:
    resources:
      limits:
        memory: 256M
      reservations:
        memory: 128M
  labels:
    - "traefik.enable=true"
    - "traefik.docker.network=jazzbands-net"
    - "traefik.http.routers.${BAND_SLUG}.entrypoints=websecure"
    - "traefik.http.routers.${BAND_SLUG}.tls.certresolver=letsencrypt"

volumes:
  traefik-certs:

networks:
  jazzbands-net:
    driver: bridge

services:
  traefik:
    image: traefik:v3.0
    container_name: jazzbands-traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@jazzbands.com"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/acme
    restart: always
    networks:
      - jazzbands-net
    deploy:
      resources:
        limits:
          memory: 128M

  boheme:
    <<: *band-common
    container_name: boheme-ssr
    build:
      args:
        BAND_SLUG: boheme
    environment:
      - PORT=3001
      - BAND_SLUG=boheme
    labels:
      - "traefik.http.routers.boheme.rule=Host(`boheme.jazzbands.com`)"
      - "traefik.http.services.boheme.loadbalancer.server.port=3001"

  canto:
    <<: *band-common
    container_name: canto-ssr
    build:
      args:
        BAND_SLUG: canto
    environment:
      - PORT=3002
      - BAND_SLUG=canto
    labels:
      - "traefik.http.routers.canto.rule=Host(`canto.jazzbands.com`)"
      - "traefik.http.services.canto.loadbalancer.server.port=3002"

  jazzola:
    <<: *band-common
    container_name: jazzola-ssr
    build:
      args:
        BAND_SLUG: jazzola
    environment:
      - PORT=3003
      - BAND_SLUG=jazzola
    labels:
      - "traefik.http.routers.jazzola.rule=Host(`jazzola.jazzbands.com`)"
      - "traefik.http.services.jazzola.loadbalancer.server.port=3003"

  swing-family:
    <<: *band-common
    container_name: swing-family-ssr
    build:
      args:
        BAND_SLUG: swing-family
    environment:
      - PORT=3004
      - BAND_SLUG=swing-family
    labels:
      - "traefik.http.routers.swing-family.rule=Host(`swing-family.jazzbands.com`)"
      - "traefik.http.services.swing-family.loadbalancer.server.port=3004"

  trio-rsh:
    <<: *band-common
    container_name: trio-rsh-ssr
    build:
      args:
        BAND_SLUG: trio-rsh
    environment:
      - PORT=3005
      - BAND_SLUG=trio-rsh
    labels:
      - "traefik.http.routers.trio-rsh.rule=Host(`trio-rsh.jazzbands.com`)"
      - "traefik.http.services.trio-rsh.loadbalancer.server.port=3005"

  west-side-trio:
    <<: *band-common
    container_name: west-side-trio-ssr
    build:
      args:
        BAND_SLUG: west-side-trio
    environment:
      - PORT=3006
      - BAND_SLUG=west-side-trio
    labels:
      - "traefik.http.routers.west-side-trio.rule=Host(`west-side-trio.jazzbands.com`)"
      - "traefik.http.services.west-side-trio.loadbalancer.server.port=3006"
