# Anchors for repeated config blocks
x-band-common: &band-common
  build:
    context: .
    dockerfile: Dockerfile.dev
  networks:
    - jazzbands-net
  env_file:
    - .env
  volumes:
    - ./app:/app/app
    - ./vite.config.ts:/app/vite.config.ts
    - ./react-router.config.ts:/app/react-router.config.ts
    - ./tsconfig.json:/app/tsconfig.json
    - ./package.json:/app/package.json
    - ./package-lock.json:/app/package-lock.json
    - ./node_modules:/app/node_modules
    - ./.env:/app/.env
    - build_vol:/app/build
    - vite_cache:/app/.vite

volumes:
  build_vol:
  vite_cache:

services:
  boheme:
    <<: *band-common
    container_name: boheme-dev
    ports:
      - "3001:5173"
    environment:
      BAND_SLUG: boheme

  canto:
    <<: *band-common
    container_name: canto-dev
    ports:
      - "3002:5173"
    environment:
      BAND_SLUG: canto

  jazzola:
    <<: *band-common
    container_name: jazzola-dev
    ports:
      - "3003:5173"
    environment:
      BAND_SLUG: jazzola

  swing-family:
    <<: *band-common
    container_name: swing-family-dev
    ports:
      - "3004:5173"
    environment:
      BAND_SLUG: swing-family

  trio-rsh:
    <<: *band-common
    container_name: trio-rsh-dev
    ports:
      - "3005:5173"
    environment:
      BAND_SLUG: trio-rsh

  west-side-trio:
    <<: *band-common
    container_name: west-side-trio-dev
    ports:
      - "3006:5173"
    environment:
      BAND_SLUG: west-side-trio

networks:
  jazzbands-net:
    driver: bridge
