# Anchors for repeated config
x-band-common: &band-common
  build:
    context: .
    dockerfile: Dockerfile.dev
  networks:
    - jazzbands-net
  env_file:
    - .env
  volumes:
    - ./app:/app/app
    - ./vite.config.ts:/app/vite.config.ts
    - ./react-router.config.ts:/app/react-router.config.ts
    - ./tsconfig.json:/app/tsconfig.json
    - ./package.json:/app/package.json
    - ./package-lock.json:/app/package-lock.json
    - ./node_modules:/app/node_modules
    - ./.env:/app/.env
    - build_vol:/app/build
    - vite_cache:/app/.vite

volumes:
  build_vol:
  vite_cache:

networks:
  jazzbands-net:
    driver: bridge

services:
  traefik:
    image: traefik:latest
    container_name: jazzbands-traefik-dev
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:8012"
      - "--accesslog=true"
    ports:
      - "8012:8012"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - jazzbands-net

  boheme:
    <<: *band-common
    container_name: boheme-dev
    environment:
      BAND_SLUG: boheme
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=jazzbands-net"
      - "traefik.http.routers.boheme-dev.entrypoints=web"
      - "traefik.http.routers.boheme-dev.rule=Host(`boheme.jazz.wildredbeard.tech`)"
      - "traefik.http.services.boheme-dev.loadbalancer.server.port=5173"

  canto:
